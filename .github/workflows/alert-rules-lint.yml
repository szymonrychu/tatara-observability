name: alert-rules-lint

# Standalone "filter-or-justify" lint over alerts/*.yaml (see CONVENTIONS.md). Kills the
# recurring false-positive class where probe 5xx responses are counted as real HTTP errors.
# Complementary to, and deliberately NOT folded into, the terraform apply workflow: this
# check needs no AWS/Grafana secrets and is the false-POSITIVE guard (issue #18 is the
# false-negative / dark-rule guard).
#
# It also runs check_metric_provenance.py, which is the false-NEGATIVE guard and covers
# BOTH alerts/*.yaml and dashboards/*.json: an alert on a metric nobody emits reports OK
# forever, and a dashboard panel on one renders empty forever. Both read green while the
# thing they watch is dark.
#
# reconcile_metric_provenance.py (issue #57) closes the REMAINING hole: check_metric_
# provenance.py only validates alerts/dashboards against the allowlist, never the
# allowlist against reality. A metric removed from a producer repo's Go source stays on
# the allowlist forever unless someone happens to hand-reconcile it, so any rule still
# selecting it keeps reporting OK / rendering empty, undetected, indefinitely. This
# script shallow-clones the 4 producer repos at main and fails on any allowlist entry
# they no longer emit. A metric removal never touches this repo's paths-filtered
# triggers below, so it also runs on a nightly schedule.

on:
  pull_request:
    paths:
      - "alerts/**"
      - "dashboards/**"
      - "scripts/lint_alert_rules.py"
      - "scripts/test_lint_alert_rules.py"
      - "scripts/check_metric_provenance.py"
      - "scripts/test_check_metric_provenance.py"
      - "scripts/reconcile_metric_provenance.py"
      - "scripts/test_reconcile_metric_provenance.py"
      - "scripts/metrics_allowlist.txt"
      - "scripts/stage_values_allowlist.txt"
      - ".github/workflows/alert-rules-lint.yml"
  push:
    branches: [main]
    paths:
      - "alerts/**"
      - "dashboards/**"
      - "scripts/lint_alert_rules.py"
      - "scripts/test_lint_alert_rules.py"
      - "scripts/check_metric_provenance.py"
      - "scripts/test_check_metric_provenance.py"
      - "scripts/reconcile_metric_provenance.py"
      - "scripts/test_reconcile_metric_provenance.py"
      - "scripts/metrics_allowlist.txt"
      - "scripts/stage_values_allowlist.txt"
      - ".github/workflows/alert-rules-lint.yml"
  schedule:
    # Nightly reverse-drift sweep: a metric removed from a producer repo never touches
    # this repo's paths above, so the PR/push triggers stay blind to it until someone
    # happens to edit an alert or dashboard. 03:23 UTC is an arbitrary off-peak minute,
    # not tied to any other schedule in this repo.
    - cron: "23 3 * * *"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: install deps
        run: pip install --quiet pyyaml

      - name: linter self-tests
        run: python3 -m unittest discover scripts -p 'test_*.py' -v

      - name: lint alert rules
        run: python3 scripts/lint_alert_rules.py

      # Covers alerts/*.yaml AND dashboards/*.json. A dashboard panel on a deleted metric
      # renders empty, silently, forever, with no CI signal at all - the same silent-green
      # failure class as a dark alert rule, one surface over.
      - name: check metric provenance (alerts + dashboards)
        run: python3 scripts/check_metric_provenance.py

      # Reverse-drift gate (issue #57): the check above only validates alerts/dashboards
      # against the allowlist. This validates the allowlist against the 4 producer repos'
      # live source, and fails on any entry none of them emit any more. Clone failures
      # (network blip, GitHub outage) are a neutral skip inside the script itself, never
      # a hard failure here.
      - name: reconcile metric provenance against producer repos
        run: python3 scripts/reconcile_metric_provenance.py
