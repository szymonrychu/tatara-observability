name: apply

# Agent-adjustable Grafana alert rules. PR -> terraform plan as a sticky comment;
# merge to main -> terraform apply. Agents edit alerts/*.yaml; the grafana_alert
# module renders them into the Grafana "Tatara" folder.

on:
  pull_request:
    paths:
      - "alerts/**"
      - "dashboards/**"
      - "**.tf"
      - "modules/**"
      - ".github/workflows/apply.yml"
  push:
    branches: [main]
    paths:
      - "alerts/**"
      - "dashboards/**"
      - "**.tf"
      - "modules/**"
      - ".github/workflows/apply.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: tatara-observability-tf
  cancel-in-progress: false

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: eu-west-1
  TF_VAR_grafana_url: ${{ secrets.TF_VAR_GRAFANA_URL }}
  TF_VAR_grafana_api_key: ${{ secrets.TF_VAR_GRAFANA_API_KEY }}
  TF_IN_AUTOMATION: "1"

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform init
        run: terraform init -input=false

      - name: terraform validate
        run: terraform validate

      # -parallelism=1: Grafana's rule-group provisioning API 409-conflicts and times out
      # when terraform writes/refreshes multiple rule groups into the same folder
      # concurrently (default parallelism 10). Serialize the Grafana API calls so each
      # rule group is applied on its own. See MEMORY.md 2026-06-28.
      #
      # Retry the whole plan/apply: the homelab Grafana provisioning API intermittently
      # stalls a single rule-group/alert-rule GET past the grafana provider's fixed 30s
      # per-request deadline (go-openapi runtime DefaultTimeout). That deadline is NOT
      # configurable via any provider argument, and the provider's own `retries` reuse the
      # same already-expired request context, so they cannot recover a context-deadline
      # stall. The stall is transient (a different rule group times out on each merge), so a
      # fresh terraform process - with fresh per-request deadlines - succeeds on a later
      # attempt. terraform is idempotent and converges to the same desired state.
      # See MEMORY.md 2026-06-28.
      - name: terraform plan
        if: github.event_name == 'pull_request'
        run: |
          set -o pipefail
          ok=0
          for attempt in 1 2 3; do
            echo "terraform plan attempt ${attempt}/3"
            if terraform plan -input=false -no-color -lock-timeout=300s -parallelism=1 2>&1 | tee plan.txt; then
              ok=1
              break
            fi
            echo "terraform plan attempt ${attempt} failed; retrying after backoff"
            sleep $((attempt * 15))
          done
          {
            echo '### terraform plan (tatara-observability)'
            echo
            echo '<details><summary>plan output (truncated)</summary>'
            echo
            echo '```hcl'
            head -c 60000 plan.txt
            echo
            echo '```'
            echo '</details>'
          } > plan_comment.md
          if [ "${ok}" -ne 1 ]; then
            echo "terraform plan failed after 3 attempts"
            exit 1
          fi

      - name: sticky plan comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: tatara-observability-plan
          path: plan_comment.md

      # Attempt 1 keeps the full refresh so genuine out-of-band drift is still reconciled.
      # Retries drop to -refresh=false: the transient homelab stall always fires on a GET
      # during the mass refresh of the ~34 rule reads (a different rule each attempt - see
      # MEMORY.md 2026-06-28), so refreshing every resource again just re-stalls and burns
      # the retry. -refresh=false plans config-vs-state and touches ONLY the actually-changed
      # rule group - state is authoritative here (this repo is the sole, bot-only writer of
      # the Tatara folder) - shrinking the provisioning-API read surface from ~34 GETs to ~1
      # so a fresh terraform process rides out the stall and lands the change. PR plans still
      # refresh, so drift stays visible in the sticky plan comment. See MEMORY.md 2026-07-05.
      - name: terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          for attempt in 1 2 3; do
            echo "terraform apply attempt ${attempt}/3"
            refresh_flag=""
            if [ "${attempt}" -gt 1 ]; then
              refresh_flag="-refresh=false"
            fi
            if terraform apply -input=false -auto-approve -lock-timeout=300s -parallelism=1 ${refresh_flag}; then
              exit 0
            fi
            echo "terraform apply attempt ${attempt} failed; retrying after backoff"
            sleep $((attempt * 15))
          done
          echo "terraform apply failed after 3 attempts"
          exit 1
