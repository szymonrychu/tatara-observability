name: apply

# Agent-adjustable Grafana alert rules. PR -> terraform plan as a sticky comment;
# merge to main -> terraform apply. Agents edit alerts/*.yaml; the grafana_alert
# module renders them into the Grafana "Tatara" folder.

on:
  pull_request:
    paths:
      - "alerts/**"
      - "dashboards/**"
      - "**.tf"
      - "modules/**"
      - ".github/workflows/apply.yml"
  push:
    branches: [main]
    paths:
      - "alerts/**"
      - "dashboards/**"
      - "**.tf"
      - "modules/**"
      - ".github/workflows/apply.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: tatara-observability-tf
  cancel-in-progress: false

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: eu-west-1
  TF_VAR_grafana_url: ${{ secrets.TF_VAR_GRAFANA_URL }}
  TF_VAR_grafana_api_key: ${{ secrets.TF_VAR_GRAFANA_API_KEY }}
  TF_IN_AUTOMATION: "1"

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform init
        run: terraform init -input=false

      - name: terraform validate
        run: terraform validate

      - name: terraform plan
        if: github.event_name == 'pull_request'
        run: |
          set -o pipefail
          terraform plan -input=false -no-color -lock-timeout=300s 2>&1 | tee plan.txt
          {
            echo '### terraform plan (tatara-observability)'
            echo
            echo '<details><summary>plan output (truncated)</summary>'
            echo
            echo '```hcl'
            head -c 60000 plan.txt
            echo
            echo '```'
            echo '</details>'
          } > plan_comment.md

      - name: sticky plan comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: tatara-observability-plan
          path: plan_comment.md

      - name: terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -input=false -auto-approve -lock-timeout=300s
