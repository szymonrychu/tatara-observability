---
interval_seconds: 60
default_no_data_state: "OK"
rules:
  # ---- workload-generic (kube-state-metrics), pinned to the chat app container ----
  - name: "tatara-chat target down"
    queries:
      - expression: |
          min(up{namespace="tatara",job="tatara-chat"})
    math_operator: "<"
    threshold: 1
    for: 5m
    decimal_points: 0
    annotations:
      summary: "tatara-chat /metrics target down (up={{ index $values \"C\" }}). Chat API unreachable; agent coordination chat unavailable."
    labels:
      homelab: "true"
      system: "tatara"
      component: "chat"
      severity: "critical"
  - name: "tatara-chat crash looping"
    queries:
      - expression: |
          sum(increase(kube_pod_container_status_restarts_total{namespace="tatara",container="tatara-chat"}[15m])) by (pod)
    math_operator: ">"
    threshold: 2
    for: 10m
    decimal_points: 0
    annotations:
      summary: "tatara-chat pod {{ index $labels \"pod\" }} restarted {{ index $values \"C\" }} times in 15m. Crash loop."
    labels:
      homelab: "true"
      system: "tatara"
      component: "chat"
      severity: "critical"
  - name: "tatara-chat OOMKilled"
    queries:
      - expression: |
          max(kube_pod_container_status_last_terminated_reason{namespace="tatara",container="tatara-chat",reason="OOMKilled"}) by (pod)
    math_operator: ">"
    threshold: 0
    for: 1m
    decimal_points: 0
    annotations:
      summary: "tatara-chat pod {{ index $labels \"pod\" }} last terminated OOMKilled. Raise the chat memory limit."
    labels:
      homelab: "true"
      system: "tatara"
      component: "chat"
      severity: "warning"
  - name: "tatara-chat container stuck waiting"
    queries:
      - expression: |
          max(kube_pod_container_status_waiting_reason{namespace="tatara",container="tatara-chat",reason=~"CrashLoopBackOff|ImagePullBackOff|ErrImagePull|CreateContainerConfigError|CreateContainerError"}) by (pod,reason)
    math_operator: ">"
    threshold: 0
    for: 10m
    decimal_points: 0
    annotations:
      summary: "tatara-chat pod {{ index $labels \"pod\" }} stuck waiting: {{ index $labels \"reason\" }}. Container not starting."
    labels:
      homelab: "true"
      system: "tatara"
      component: "chat"
      severity: "critical"
  - name: "tatara-chat pod not ready"
    queries:
      - expression: |
          min(kube_pod_status_ready{namespace="tatara",condition="true"} and on(pod) kube_pod_container_status_restarts_total{namespace="tatara",container="tatara-chat"})
    math_operator: "<"
    threshold: 1
    for: 10m
    decimal_points: 0
    annotations:
      summary: "tatara-chat pod not Ready (ready={{ index $values \"C\" }}) for 10m. Service endpoints missing."
    labels:
      homelab: "true"
      system: "tatara"
      component: "chat"
      severity: "warning"
  # ---- chat-specific ----
  - name: "tatara-chat HTTP 5xx ratio high"
    queries:
      - expression: |
          (sum(rate(http_requests_total{job="tatara-chat",status=~"5.."}[5m])) or vector(0)) / clamp_min(sum(rate(http_requests_total{job="tatara-chat"}[5m])), 1)
    math_operator: ">"
    threshold: 0.05
    for: 10m
    decimal_points: 2
    annotations:
      summary: "tatara-chat serving {{ index $values \"C\" }} ratio 5xx responses (>5%) for 10m. Chat API erroring."
    labels:
      homelab: "true"
      system: "tatara"
      component: "chat"
      severity: "warning"
  - name: "tatara-chat store operations erroring"
    queries:
      - expression: |
          sum(rate(chat_store_errors_total{job="tatara-chat"}[10m]))
    math_operator: ">"
    threshold: 0
    for: 10m
    decimal_points: 2
    annotations:
      summary: "tatara-chat store operations failing ({{ index $values \"C\" }}/s). Postgres-backed chat persistence degraded."
    labels:
      homelab: "true"
      system: "tatara"
      component: "chat"
      severity: "warning"
  - name: "tatara-chat store p95 latency high"
    queries:
      - expression: |
          histogram_quantile(0.95, sum(rate(chat_store_duration_seconds_bucket{job="tatara-chat"}[10m])) by (le, operation)) and on(operation) (sum(rate(chat_store_duration_seconds_count{job="tatara-chat"}[10m])) by (operation) > 0)
    math_operator: ">"
    threshold: 1
    for: 15m
    decimal_points: 2
    annotations:
      summary: "tatara-chat store op {{ index $labels \"operation\" }} p95 latency {{ index $values \"C\" }}s (>1s) for 15m. Postgres slow."
    labels:
      homelab: "true"
      system: "tatara"
      component: "chat"
      severity: "warning"
  - name: "tatara-chat sweeper stalled"
    queries:
      - expression: |
          sum(increase(chat_sweeper_runs_total{job="tatara-chat"}[30m]))
    math_operator: "<"
    threshold: 1
    for: 30m
    decimal_points: 0
    annotations:
      summary: "tatara-chat TTL/purge sweeper has not run in 30m ({{ index $values \"C\" }} runs). Expired rooms not archived/purged."
    labels:
      homelab: "true"
      system: "tatara"
      component: "chat"
      severity: "warning"
  - name: "tatara-chat sweeper erroring"
    queries:
      - expression: |
          sum(rate(chat_sweeper_errors_total{job="tatara-chat"}[15m]))
    math_operator: ">"
    threshold: 0
    for: 15m
    decimal_points: 2
    annotations:
      summary: "tatara-chat sweeper failing in phase {{ index $labels \"phase\" }} ({{ index $values \"C\" }}/s). TTL cleanup degraded."
    labels:
      homelab: "true"
      system: "tatara"
      component: "chat"
      severity: "warning"
  - name: "tatara-chat panics recovered"
    queries:
      - expression: |
          sum(increase(panics_total{job="tatara-chat"}[15m]))
    math_operator: ">"
    threshold: 0
    for: 1m
    decimal_points: 0
    annotations:
      summary: "tatara-chat recovered {{ index $values \"C\" }} HTTP handler panic(s) in 15m. Investigate the chat handler crash."
    labels:
      homelab: "true"
      system: "tatara"
      component: "chat"
      severity: "warning"
  # ---- info (homelab email only, no system label, does not raise an incident) ----
  - name: "tatara-chat auth rejections elevated"
    queries:
      - expression: |
          sum(rate(tatara_chat_auth_total{job="tatara-chat",result=~"missing_token|invalid_scheme|invalid_token"}[10m]))
    math_operator: ">"
    threshold: 1
    for: 15m
    decimal_points: 2
    annotations:
      summary: "tatara-chat rejecting auth at {{ index $values \"C\" }}/s (missing/invalid tokens) for 15m. Possible misconfigured client or token expiry."
    labels:
      homelab: "true"
      component: "chat"
      severity: "info"
