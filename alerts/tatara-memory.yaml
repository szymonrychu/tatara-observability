---
interval_seconds: 60
default_no_data_state: "OK"
rules:
  # ---------------------------------------------------------------------------
  # Workload-generic rules (kube-state-metrics) pinned to the memory API server
  # pods. The memory server runs one Deployment per Project (mem-<project>-...),
  # so the selector matches mem-* but excludes the neo4j/pg/lightrag sidecar
  # workloads. These rules key off kube-state-metrics for pod-lifecycle state
  # (readiness, restarts, OOM, waiting reason), which is only available there
  # regardless of app-level scrape.
  # ---------------------------------------------------------------------------
  - name: "Memory API server pod not ready"
    queries:
      - expression: |
          max(kube_pod_status_ready{namespace="tatara",pod=~"mem-.+",pod!~"mem-.*-(neo4j|pg|lightrag).*",condition="true"}) by (pod)
    math_operator: "<"
    threshold: 1
    for: 10m
    decimal_points: 0
    annotations:
      summary: "tatara-memory pod {{ index $labels \"pod\" }} not Ready for 10m. Project memory API degraded."
    labels:
      homelab: "true"
      system: "tatara"
      component: "memory"
      severity: "critical"
  - name: "Memory API server crash looping"
    queries:
      - expression: |
          max(rate(kube_pod_container_status_restarts_total{namespace="tatara",pod=~"mem-.+",pod!~"mem-.*-(neo4j|pg|lightrag).*"}[15m]) * 900) by (pod)
    math_operator: ">"
    threshold: 2
    for: 15m
    decimal_points: 0
    annotations:
      summary: "tatara-memory pod {{ index $labels \"pod\" }} restarting ~{{ index $values \"C\" }} times / 15m. Crash loop."
    labels:
      homelab: "true"
      system: "tatara"
      component: "memory"
      severity: "warning"
  - name: "Memory API server OOMKilled"
    queries:
      - expression: |
          max(kube_pod_container_status_last_terminated_reason{namespace="tatara",pod=~"mem-.+",pod!~"mem-.*-(neo4j|pg|lightrag).*",reason="OOMKilled"}) by (pod)
    math_operator: ">"
    threshold: 0
    for: 1m
    decimal_points: 0
    annotations:
      summary: "tatara-memory pod {{ index $labels \"pod\" }} was OOMKilled. Raise memory limit or investigate leak."
    labels:
      homelab: "true"
      system: "tatara"
      component: "memory"
      severity: "warning"
  - name: "Memory API server container stuck waiting"
    queries:
      - expression: |
          max(kube_pod_container_status_waiting_reason{namespace="tatara",pod=~"mem-.+",pod!~"mem-.*-(neo4j|pg|lightrag).*",reason=~"CrashLoopBackOff|ImagePullBackOff|ErrImagePull|CreateContainerError|CreateContainerConfigError"}) by (pod,reason)
    math_operator: ">"
    threshold: 0
    for: 10m
    decimal_points: 0
    annotations:
      summary: "tatara-memory pod {{ index $labels \"pod\" }} container stuck waiting ({{ index $labels \"reason\" }}) for 10m."
    labels:
      homelab: "true"
      system: "tatara"
      component: "memory"
      severity: "critical"
  # ---------------------------------------------------------------------------
  # Component-specific rules. Metric names + label keys are taken verbatim from
  # tatara-memory/internal/**/metrics.go. The mem-* pods are scraped by
  # Prometheus (job=tatara-memory), so these series are live.
  # ---------------------------------------------------------------------------
  - name: "Memory HTTP 5xx error ratio high"
    queries:
      - expression: |
          sum(rate(http_requests_total{namespace="tatara",pod=~"mem-.+",pod!~"mem-.*-(neo4j|pg|lightrag).*",route!~"/readyz|/healthz|/metrics",status=~"Internal Server Error|Bad Gateway|Service Unavailable|Gateway Timeout|Not Implemented|HTTP Version Not Supported"}[10m]))
          /
          clamp_min(sum(rate(http_requests_total{namespace="tatara",pod=~"mem-.+",pod!~"mem-.*-(neo4j|pg|lightrag).*",route!~"/readyz|/healthz|/metrics"}[10m])), 0.001)
    math_operator: ">"
    threshold: 0.05
    for: 10m
    decimal_points: 2
    annotations:
      summary: "tatara-memory HTTP 5xx ratio {{ index $values \"C\" }} (>5%, excludes /readyz|/healthz|/metrics probes) over 10m. API serving errors."
    labels:
      homelab: "true"
      system: "tatara"
      component: "memory"
      severity: "warning"
  - name: "Memory service operation error ratio high"
    queries:
      - expression: |
          sum(rate(tatara_memory_op_total{namespace="tatara",result="error",op!~"get|get_entity"}[10m]))
          /
          clamp_min(sum(rate(tatara_memory_op_total{namespace="tatara",op!~"get|get_entity"}[10m])), 0.001)
    math_operator: ">"
    threshold: 0.1
    for: 15m
    decimal_points: 2
    annotations:
      summary: "tatara-memory service op error ratio {{ index $values \"C\" }} (>10% of memory service ops - writes + non-lookup reads - erroring over 10m; get/get_entity not-found excluded). Agents failing to read/write memory."
    labels:
      homelab: "true"
      system: "tatara"
      component: "memory"
      severity: "warning"
  - name: "Memory API server HTTP handler panics"
    queries:
      - expression: |
          sum(increase(http_panics_total{job="tatara-memory"}[15m]))
    math_operator: ">"
    threshold: 0
    for: 1m
    decimal_points: 0
    annotations:
      summary: "tatara-memory recovered {{ index $values \"C\" }} HTTP handler panic(s) in 15m. Investigate the memory API handler crash."
    labels:
      homelab: "true"
      system: "tatara"
      component: "memory"
      severity: "warning"
  - name: "Memory LightRAG call error ratio high"
    queries:
      - expression: |
          sum(rate(lightrag_calls_total{namespace="tatara",result="error"}[10m]))
          /
          clamp_min(sum(rate(lightrag_calls_total{namespace="tatara"}[10m])), 0.001)
    math_operator: ">"
    threshold: 0.1
    for: 10m
    decimal_points: 2
    annotations:
      summary: "tatara-memory LightRAG client error ratio {{ index $values \"C\" }} (>10%) over 10m. Ingest/query backend failing."
    labels:
      homelab: "true"
      system: "tatara"
      component: "memory"
      severity: "warning"
  - name: "Memory LightRAG call p95 latency high"
    queries:
      - expression: |
          histogram_quantile(0.95, sum(rate(lightrag_call_duration_seconds_bucket{namespace="tatara"}[10m])) by (le)) and on() (sum(rate(lightrag_call_duration_seconds_count{namespace="tatara"}[10m])) > 0)
    math_operator: ">"
    threshold: 30
    for: 15m
    decimal_points: 2
    annotations:
      summary: "tatara-memory LightRAG call p95 latency {{ index $values \"C\" }}s (>30s) over 10m. Backend slow."
    labels:
      homelab: "true"
      system: "tatara"
      component: "memory"
      severity: "warning"
  - name: "Memory ingest job failure ratio high"
    queries:
      - expression: |
          sum(rate(ingest_jobs_total{namespace="tatara",status="failed"}[30m]))
          /
          clamp_min(sum(rate(ingest_jobs_total{namespace="tatara"}[30m])), 0.001)
    math_operator: ">"
    threshold: 0.2
    for: 30m
    decimal_points: 2
    annotations:
      summary: "tatara-memory ingest job failure ratio {{ index $values \"C\" }} (>20%) over 30m. Repo ingestion degraded."
    labels:
      homelab: "true"
      system: "tatara"
      component: "memory"
      severity: "warning"
  - name: "Memory ingest item error rate elevated"
    queries:
      - expression: |
          sum(rate(ingest_items_total{namespace="tatara",result=~"error|timeout"}[15m]))
    math_operator: ">"
    threshold: 0
    for: 30m
    decimal_points: 2
    annotations:
      summary: "tatara-memory ingest items erroring/timing out at {{ index $values \"C\" }}/s for 30m. Items being dropped."
    labels:
      homelab: "true"
      component: "memory"
      severity: "info"
  - name: "Memory code-graph query errors"
    queries:
      - expression: |
          sum(rate(code_graph_query_total{namespace="tatara",result="error"}[10m]))
    math_operator: ">"
    threshold: 0
    for: 15m
    decimal_points: 2
    annotations:
      summary: "tatara-memory code-graph queries erroring at {{ index $values \"C\" }}/s for 15m. Agent graph traversals failing."
    labels:
      homelab: "true"
      system: "tatara"
      component: "memory"
      severity: "warning"
  - name: "Memory code-graph analytics stalled with dirty repos"
    queries:
      - expression: |
          max(code_graph_analytics_dirty_repos{namespace="tatara"})
          * on() group_left()
          (sum(rate(code_graph_analytics_runs_total{namespace="tatara"}[30m])) == bool 0)
    math_operator: ">"
    threshold: 0
    for: 1h
    decimal_points: 0
    annotations:
      summary: "tatara-memory code-graph analytics stalled: {{ index $values \"C\" }} dirty repos with no recompute in 30m. Centrality/community data stale."
    labels:
      homelab: "true"
      system: "tatara"
      component: "memory"
      severity: "warning"
  # ---------------------------------------------------------------------------
  # Root-cause early-warning added after the 2026-07-05 mem-tatara-pg WAL-fill
  # incident: the CNPG postgres volumes slowly filled with un-recyclable WAL
  # (a replica down for days held a replication slot) until the CephFS quota was
  # exceeded, crashlooping the cluster below memory quorum and gating every tatara
  # Task for ~4h. NO disk-fullness alert existed, so the only signal was a
  # symptom (HTTP 5xx) firing AFTER the outage - and that symptom's incident agent
  # was itself gated on the down memory (circular). These two rules catch the root
  # cause days early (volume filling) and the platform-level symptom (memory stuck
  # not-Ready), independent of the memory app being up.
  # ---------------------------------------------------------------------------
  - name: "Memory PVC volume near full"
    queries:
      - expression: |
          min(
            kubelet_volume_stats_available_bytes{namespace="tatara",persistentvolumeclaim=~"mem-.*"}
            /
            kubelet_volume_stats_capacity_bytes{namespace="tatara",persistentvolumeclaim=~"mem-.*"}
          ) by (persistentvolumeclaim)
    math_operator: "<"
    threshold: 0.15
    for: 15m
    decimal_points: 2
    annotations:
      summary: "tatara-memory PVC {{ index $labels \"persistentvolumeclaim\" }} is {{ index $values \"C\" }} free (below 15%). Postgres WAL/data fill leads to a CNPG crash loop below memory quorum; expand storage (Project spec.memory.pgStorage / neo4jStorage) before it hits 0."
    labels:
      homelab: "true"
      system: "tatara"
      component: "memory"
      severity: "warning"
  - name: "Memory stack stuck not ready"
    queries:
      - expression: |
          max(operator_memory_stacks{namespace="tatara",job="tatara-operator",phase=~"Provisioning|Failed"})
    math_operator: ">"
    threshold: 0
    for: 15m
    decimal_points: 0
    annotations:
      summary: "{{ index $values \"C\" }} tatara-memory stack(s) stuck in Provisioning/Failed for 15m (not Ready). Every Task for that project is hard-gated on memory Ready, so the whole project stalls - INCLUDING the incident agent that would investigate this (circular dependency: infra-outage self-heal needs the subsystem that is down). Escalate to a human / check the CNPG cluster + PVCs directly."
    labels:
      homelab: "true"
      system: "tatara"
      component: "memory"
      severity: "critical"
  # 2026-07-06 follow-up, same mem-tatara-pg family: the WAL-fill fix left a 2Gi
  # dedicated WAL volume that was itself too small, crashlooping both cnpg REPLICAS
  # for ~8h at 1/3 ready. It went unnoticed because every pod-lifecycle rule above
  # EXCLUDES the backing stores (pod!~"...-(neo4j|pg|lightrag)...") and "Memory
  # stack stuck not ready" stayed silent - the memory API kept serving via the
  # surviving primary, so the stack read Ready while HA was gone. This is the mirror
  # of "Memory API server container stuck waiting" for the stateful HA members. Keyed
  # on the container waiting REASON, not pod-not-ready, so a legitimate replica
  # re-clone (Running through basebackup/catchup, which can exceed 10m on a large DB)
  # does NOT fire - only a genuinely stuck container (crash loop, image/create error)
  # does. The anchored -(pg|neo4j)-[0-9]+ selector matches the stable instance pods
  # (mem-*-pg-N, mem-*-neo4j-N), not the transient -join-/basebackup clone pods.
  # Critical: a member stuck 10m means HA is degraded (or a store is down) and the
  # incident agent must act BEFORE the primary also fails and hard-gates the whole
  # project (the circular-deadlock case). A downed replica leaves memory serving, so
  # that agent can still run. (lightrag outages surface via the LightRAG/API rules.)
  - name: "Memory postgres or neo4j container stuck waiting"
    queries:
      - expression: |
          max(kube_pod_container_status_waiting_reason{namespace="tatara",pod=~"mem-.*-(pg|neo4j)-[0-9]+",reason=~"CrashLoopBackOff|ImagePullBackOff|ErrImagePull|CreateContainerError|CreateContainerConfigError"}) by (pod,reason)
    math_operator: ">"
    threshold: 0
    for: 10m
    decimal_points: 0
    annotations:
      summary: "tatara-memory stateful pod {{ index $labels \"pod\" }} (cnpg postgres or neo4j) container stuck ({{ index $labels \"reason\" }}) for 10m. A cnpg postgres member stuck = HA degraded while the primary keeps serving (this silently masked an 8h replica crash loop on 2026-07-06); a neo4j pod stuck = graph queries failing. Check the CNPG cluster (kubectl cnpg status mem-<project>-pg) / the neo4j StatefulSet."
    labels:
      homelab: "true"
      system: "tatara"
      component: "memory"
      severity: "critical"
