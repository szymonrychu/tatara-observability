---
interval_seconds: 60
default_no_data_state: "OK"
rules:
  # ----------------------------------------------------------------------------
  # Workload-generic: target down, crash loop, OOM, container-waiting, not-ready.
  # Pinned to the tatara-operator Deployment in namespace tatara.
  # ----------------------------------------------------------------------------
  - name: "Operator scrape target down"
    queries:
      - expression: |
          sum(up{namespace="tatara",job="tatara-operator"}) or vector(0)
    math_operator: "<"
    threshold: 1
    for: 5m
    decimal_points: 0
    annotations:
      summary: "All tatara-operator replicas are down (sum(up)={{ index $values \"C\" }}). The platform control loop is dead: no reconciles, webhooks, or agent turns. The `or vector(0)` fallback makes this fire even when the scrape targets have vanished entirely (e.g. scaled to zero)."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "critical"
  # Fires when the Deployment is SUPPOSED to be running (spec_replicas >= 1) but
  # has zero available replicas - unschedulable, or every pod failing readiness.
  # Two deliberate design choices (issue #33):
  #   1. Gated on `and (max(kube_deployment_spec_replicas) >= 1)` so an
  #      INTENTIONAL scale-to-zero does not page. When spec is 0 the guard drops
  #      the series -> empty -> NoData -> default_no_data_state: OK.
  #   2. NO `or vector(0)` fallback. A fabricated 0 turned a transient
  #      kube-state-metrics scrape gap (series briefly absent) into a false
  #      CRITICAL - the #33 root cause. Without it, an absent series is NoData
  #      -> OK, not a page.
  # Full-outage / Deployment-deleted coverage is unaffected: "Operator scrape
  # target down" (sum(up) or vector(0)) and "Operator pod not ready" still page
  # when the operator is gone entirely, independent of kube-state-metrics.
  - name: "Operator deployment has no available replicas"
    queries:
      - expression: |
          max(kube_deployment_status_replicas_available{namespace="tatara",deployment="tatara-operator"}) and (max(kube_deployment_spec_replicas{namespace="tatara",deployment="tatara-operator"}) >= 1)
    math_operator: "<"
    threshold: 1
    for: 5m
    decimal_points: 0
    annotations:
      summary: "tatara-operator Deployment has {{ index $values \"C\" }} available replicas (<1) while its spec calls for >=1. It is unschedulable or every pod is failing readiness; the platform control loop is down. Gated on spec_replicas>=1 so an intentional scale-to-zero does not fire, and it reports NoData (not a fabricated 0) during a transient kube-state-metrics gap."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "critical"
  # Fires on PARTIAL HA degradation: 1-2 of the 3 replicas up (leader election
  # still works but redundancy is reduced). NO `or vector(0)` fallback (issue #50,
  # same class as #33): a fabricated 0 turned a transient scrape gap - every `up`
  # series briefly absent on an environment cold start or a Prometheus restart -
  # into a false 0 that satisfied `< 3` for the whole 15m `for:` window while all
  # 3 replicas were healthy. Without it, an empty `up == 1` set is NoData -> OK
  # (default_no_data_state), not a page. `count(up == 1)` already excludes down
  # targets (they report up=0), so a genuine 1-2/3 degradation still fires.
  # A full 0/3 outage is deliberately NOT this warning's job: series present-but-0
  # or vanished -> empty count -> NoData -> OK here, and pages instead via the
  # CRITICAL "Operator scrape target down" (sum(up) or vector(0) < 1) and "Operator
  # pod not ready", which intentionally DO fabricate a 0 to page on total absence.
  - name: "Operator replica missing"
    queries:
      - expression: |
          count(up{namespace="tatara",job="tatara-operator"} == 1)
    math_operator: "<"
    threshold: 3
    for: 15m
    decimal_points: 0
    annotations:
      summary: "Only {{ index $values \"C\" }}/3 tatara-operator replicas are up. Leader election and HA are degraded. Partial-degradation only (1-2/3): a full 0/3 outage or a transient scrape gap is NoData -> OK here and pages via the CRITICAL down rules instead."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  - name: "Operator crash looping"
    queries:
      - expression: |
          max by (pod) (increase(kube_pod_container_status_restarts_total{namespace="tatara",pod=~"tatara-operator-.*",container="tatara-operator"}[15m]))
    math_operator: ">"
    threshold: 2
    for: 5m
    decimal_points: 0
    annotations:
      summary: "tatara-operator container restarted {{ index $values \"C\" }} times in 15m. Pod {{ index $labels \"pod\" }} is crash looping."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "critical"
  - name: "Operator OOMKilled"
    queries:
      - expression: |
          max by (pod) (kube_pod_container_status_last_terminated_reason{namespace="tatara",pod=~"tatara-operator-.*",reason="OOMKilled"})
    math_operator: ">"
    threshold: 0
    for: 1m
    decimal_points: 0
    annotations:
      summary: "tatara-operator pod {{ index $labels \"pod\" }} was OOMKilled. Raise the memory limit or investigate a leak."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  - name: "Operator container stuck waiting"
    queries:
      - expression: |
          max by (pod, reason) (kube_pod_container_status_waiting_reason{namespace="tatara",pod=~"tatara-operator-.*",reason=~"CrashLoopBackOff|ImagePullBackOff|ErrImagePull|CreateContainerConfigError|CreateContainerError"})
    math_operator: ">"
    threshold: 0
    for: 10m
    decimal_points: 0
    annotations:
      summary: "tatara-operator pod {{ index $labels \"pod\" }} container stuck waiting ({{ index $labels \"reason\" }}). It is not running."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "critical"
  - name: "Operator pod not ready"
    queries:
      - expression: |
          sum(kube_pod_status_ready{namespace="tatara",pod=~"tatara-operator-.*",condition="true"}) or vector(0)
    math_operator: "<"
    threshold: 1
    for: 10m
    decimal_points: 0
    annotations:
      summary: "No tatara-operator pod is Ready (sum ready={{ index $values \"C\" }}). Readiness probe failing across the Deployment, or no pods exist at all (the `or vector(0)` fallback fires when the readiness series has vanished)."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "critical"
  # ----------------------------------------------------------------------------
  # Control-loop liveness: the leader emits business metrics only. A wedged or
  # stalled loop shows up as flat scan/reconcile counters across all replicas.
  # ----------------------------------------------------------------------------
  - name: "Operator reconcile loop wedged"
    queries:
      - expression: |
          sum(increase(operator_reconcile_total{namespace="tatara",job="tatara-operator"}[15m])) or vector(0)
    math_operator: "<"
    threshold: 1
    for: 15m
    decimal_points: 0
    annotations:
      summary: "No reconciles completed across all tatara-operator replicas in 15m (increase={{ index $values \"C\" }}). The controller loop is wedged, or the operator is gone entirely (the `or vector(0)` fallback fires when the reconcile series has vanished)."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "critical"
  - name: "Operator reconcile error ratio high"
    queries:
      - expression: |
          sum(increase(operator_reconcile_total{namespace="tatara",job="tatara-operator",result="error"}[15m])) / clamp_min(sum(increase(operator_reconcile_total{namespace="tatara",job="tatara-operator"}[15m])), 1)
    math_operator: ">"
    threshold: 0.2
    for: 15m
    decimal_points: 2
    annotations:
      summary: "tatara-operator reconcile error ratio is {{ index $values \"C\" }} (>0.20) over 15m. Reconciles are failing en masse."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  # ----------------------------------------------------------------------------
  # Agent turn pipeline: submit failures and slow SubmitTurn calls stall agents.
  # ----------------------------------------------------------------------------
  - name: "Operator turn submit failure ratio high"
    queries:
      - expression: |
          (sum(increase(operator_turn_submit_total{namespace="tatara",job="tatara-operator",result="error"}[15m])) / clamp_min(sum(increase(operator_turn_submit_total{namespace="tatara",job="tatara-operator"}[15m])), 1)) and (sum(increase(operator_turn_submit_total{namespace="tatara",job="tatara-operator"}[15m])) >= 10)
    math_operator: ">"
    threshold: 0.3
    for: 15m
    decimal_points: 2
    annotations:
      summary: "tatara-operator turn-submit error ratio is {{ index $values \"C\" }} (>0.30) over 15m. Agent turns are failing to dispatch to wrappers."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  - name: "Operator turn submit p95 latency high"
    queries:
      - expression: |
          histogram_quantile(0.95, sum(rate(operator_turn_submit_duration_seconds_bucket{namespace="tatara",job="tatara-operator"}[15m])) by (le)) and on() (sum(rate(operator_turn_submit_duration_seconds_count{namespace="tatara",job="tatara-operator"}[15m])) > 0)
    math_operator: ">"
    threshold: 30
    for: 15m
    decimal_points: 1
    annotations:
      summary: "tatara-operator SubmitTurn p95 latency is {{ index $values \"C\" }}s (>30s) over 15m. Dispatching agent turns is slow; wrappers may be unreachable or saturated."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  - name: "Operator agent HTTP failure spike"
    queries:
      - expression: |
          sum(rate(operator_agent_http_total{namespace="tatara",job="tatara-operator",outcome=~"unreachable|timeout|transport_error"}[10m]))
    math_operator: ">"
    threshold: 0.2
    for: 10m
    decimal_points: 2
    annotations:
      summary: "tatara-operator agent-wrapper HTTP failures (unreachable/timeout/transport) at {{ index $values \"C\" }}/s over 10m. Wrappers are unreachable; agents cannot run turns."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  - name: "Operator agent boot crash budget exhausted"
    queries:
      - expression: |
          sum by (reason) (increase(operator_agent_boot_crash_total{namespace="tatara",job="tatara-operator",outcome="failed"}[1h]))
    math_operator: ">"
    threshold: 0
    for: 5m
    decimal_points: 0
    annotations:
      summary: "tatara-operator exhausted the wrapper boot-respawn budget {{ index $values \"C\" }} time(s) in 1h (reason={{ index $labels \"reason\" }}). Tasks are failing because wrapper pods never reach /readyz."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  # ----------------------------------------------------------------------------
  # SCM / webhook write health: writeback failures break the agent->repo loop.
  # ----------------------------------------------------------------------------
  - name: "Operator SCM write failure ratio high"
    queries:
      - expression: |
          sum(increase(operator_scm_writes_total{namespace="tatara",job="tatara-operator",result="error"}[15m])) / clamp_min(sum(increase(operator_scm_writes_total{namespace="tatara",job="tatara-operator"}[15m])), 1)
    math_operator: ">"
    threshold: 0.3
    for: 15m
    decimal_points: 2
    annotations:
      summary: "tatara-operator SCM write error ratio is {{ index $values \"C\" }} (>0.30) over 15m. Comments/labels/approvals/PRs are failing to land on GitHub/GitLab."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  - name: "Operator webhook error ratio high"
    queries:
      - expression: |
          sum(increase(operator_webhook_events_total{namespace="tatara",job="tatara-operator",result=~"error|bad_signature|bad_request"}[15m])) / clamp_min(sum(increase(operator_webhook_events_total{namespace="tatara",job="tatara-operator"}[15m])), 1)
    math_operator: ">"
    threshold: 0.2
    for: 15m
    decimal_points: 2
    annotations:
      summary: "tatara-operator webhook error ratio is {{ index $values \"C\" }} (>0.20) over 15m. Inbound SCM events are being rejected; the platform may stop reacting to repo activity."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  # ----------------------------------------------------------------------------
  # Memory stacks + lightrag: a Failed per-project memory stack blocks its agents.
  # ----------------------------------------------------------------------------
  - name: "Operator memory stack failed"
    queries:
      - expression: |
          max(operator_memory_stacks{namespace="tatara",job="tatara-operator",phase="Failed"})
    math_operator: ">"
    threshold: 0
    for: 10m
    decimal_points: 0
    annotations:
      summary: "{{ index $values \"C\" }} per-project tatara-memory stack(s) are in phase Failed. Agents for that project cannot read/write memory."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "critical"
  - name: "Operator memory retrieval surface absent"
    queries:
      - expression: |
          sum by (route) (increase(operator_memory_retrieval_probe_total{namespace="tatara",job="tatara-operator",result="absent"}[30m]))
    math_operator: ">"
    threshold: 0
    for: 15m
    decimal_points: 0
    annotations:
      summary: "tatara-operator probed {{ index $values \"C\" }} tatara-memory retrieval routes as absent (404) in 30m. A memory binary has drifted/regressed; route {{ index $labels \"route\" }} is gone."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  # Sibling of the memory-retrieval probe: the operator's synthetic probe of
  # whether agents can actually reach the operator-write tool backend and the
  # chat tool backend. result ok|present are HEALTHY (present = route+auth
  # reachable, 401/403); absent|error|unreachable are the real failures (route
  # drift / broken 5xx handler / process down). Excluding ok|present is required.
  - name: "Operator tool-surface probe failing"
    queries:
      - expression: |
          sum by (backend) (increase(operator_tool_surface_probe_total{namespace="tatara",job="tatara-operator",result=~"absent|error|unreachable"}[30m]))
    math_operator: ">"
    threshold: 0
    for: 15m
    decimal_points: 0
    annotations:
      summary: "tatara-operator probed the {{ index $labels \"backend\" }} tool backend as failing (absent/error/unreachable) {{ index $values \"C\" }} times in 30m. Agents may have lost access to that tool surface."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  # ----------------------------------------------------------------------------
  # Task throughput + queue: saturated lanes and terminal failures stall the loop.
  # ----------------------------------------------------------------------------
  # Concurrency now gates AGENT PODS, not Tasks (contract A.6: maxConcurrentAgents).
  # Tasks are long-lived scaffolding - one sitting in clarifying for 24h is HEALTHY and
  # costs nothing. Counting Tasks as "work in flight" would false-fire permanently, which
  # is why operator_tasks_inflight is gone. Count the pods.
  # Threshold 5.999 = 2 projects x maxConcurrentAgents: 3 (tatara-helmfile
  # values/project-{tatara,infrastructure}/common.yaml). BUMPING maxConcurrentAgents THERE
  # REQUIRES BUMPING THIS THRESHOLD IN THE SAME CHANGE.
  # Gated on a non-empty queue: a full pod pool with nothing waiting is throughput, not
  # starvation.
  - name: "Operator agent pod pool saturated with queued work"
    queries:
      - expression: |
          (sum(kube_pod_container_status_running{namespace="tatara",container="wrapper"}) or vector(0)) and (sum(operator_queue_depth{namespace="tatara",job="tatara-operator"}) > 0)
    math_operator: ">"
    threshold: 5.999
    for: 30m
    decimal_points: 0
    annotations:
      summary: "{{ index $values \"C\" }} agent pods running (at the 2 x maxConcurrentAgents=3 ceiling) with QueuedEvents still waiting, for 30m. The pod lane is saturated and new work is starved. Incidents hold a reserved slot (AlertCapacity >= 1), so this is not an incident outage - but every webhook and sweep event is queueing."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  # CROSS-REPO DEPENDENCY D1 (contract Global Constraint 7): operator_task_terminal_total
  # must survive with phase swapped for stage+stageReason+kind. As of this rewrite the
  # operator worktree has NOT landed the swap yet (internal/obs/task_metrics.go:31-33
  # still declares {kind,phase,reason}) - see scripts/metrics_allowlist.txt's census note.
  # Both rules below are written on the D1 assumption per plan Task 6. RE-VERIFY against
  # the merged operator (grep internal/obs/*.go for stageReason) before this ships. If D1
  # is refused, replace both with the Task 6 fallback: a single gauge-level rule on
  # sum(operator_task_stage{namespace="tatara",job="tatara-operator",stage="failed"}),
  # threshold 3, for 30m - accepting that it latches for the 7-day failed retention.
  #
  # phase is GONE (contract A.5). Terminal transitions are now stage=failed|rejected with a
  # stageReason from the closed set in F.5. Splitting by stageReason is what makes the alert
  # actionable: turn-budget-exhausted is a cost problem, pod-recreation-exhausted is an
  # infrastructure problem, agent-contract-mismatch is a skewed release train.
  - name: "Operator task failure spike"
    queries:
      - expression: |
          sum by (stageReason) (increase(operator_task_terminal_total{namespace="tatara",job="tatara-operator",stage="failed"}[1h])) or vector(0)
    math_operator: ">"
    threshold: 3
    for: 15m
    decimal_points: 0
    annotations:
      summary: "{{ index $values \"C\" }} Task(s) reached stage=failed with stageReason={{ index $labels \"stageReason\" }} in 1h (>3). Agents are failing terminally at an elevated rate. Failed Tasks are kept for 7 days as debugging artifacts (contract B.6), so the CRs are still there: kubectl get tasks -n tatara."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  - name: "Operator queue depth backlog"
    queries:
      - expression: |
          max by (project, class) (operator_queue_depth{namespace="tatara",job="tatara-operator"})
    math_operator: ">"
    threshold: 10
    for: 30m
    decimal_points: 0
    annotations:
      summary: "tatara-operator queue depth is {{ index $values \"C\" }} (>10) for project {{ index $labels \"project\" }} class {{ index $labels \"class\" }}. QueuedEvents are backing up faster than they admit."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  # ----------------------------------------------------------------------------
  # Token/$ spend: model- and cache-aware runaway detection over the durable
  # operator_task_tokens_total metric (durable-measurement design, review G17).
  #
  # COVERAGE GUARD: the `model`/`type=cache_read|cache_creation` label set below
  # is produced by the operator's durable-measurement work (tatara-operator
  # AddTaskTokens model/cache args, shipped in tatara-operator #220). The
  # coverage-gap rule directly below guards against a schema REGRESSION: the
  # operator emitting operator_task_tokens_total series WITHOUT the model/cache
  # labels (the pre-#220 state), which would silently blind the "$/s" detector.
  #
  # It must NOT fire on ordinary idleness: operator_task_tokens_total is an
  # ephemeral per-task counter (series are lazily created on the first
  # token-bearing turn and deleted on task GC by the reaper), so the whole
  # selector is legitimately empty whenever the fleet is idle or cold-starting.
  # A raw absent() therefore pages on every quiet period. The rule below is
  # gated on `count(operator_task_tokens_total) > 0` so it only fires when the
  # operator IS emitting token series but none carry the model/cache labels -
  # the real regression - and stays silent (NoData -> OK) when idle.
  # ----------------------------------------------------------------------------
  - name: "Agent token spend runaway series missing (coverage gap)"
    queries:
      - expression: |
          (count(operator_task_tokens_total) > 0)
          and
          absent(operator_task_tokens_total{model=~".+", type=~"input|output|cache_read|cache_creation"})
    math_operator: ">"
    threshold: 0
    for: 15m
    decimal_points: 0
    annotations:
      summary: "operator_task_tokens_total is being emitted but NO series carry the model/cache-aware labels (model + type=input|output|cache_read|cache_creation) for 15m, while token series ARE present. The operator's model/cache token schema (tatara-operator #220) has regressed, so the 'Agent token spend runaway ($/s)' rule below has no data source and CANNOT detect a runaway. This rule is gated on token activity, so it does NOT fire on an idle fleet - if it is firing, the operator token-metric labelling is broken. Check AddTaskTokens model/cacheRead/cacheCreation args in tatara-operator."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  - name: "Agent token spend runaway ($/s)"
    queries:
      - expression: |
          sum(
              rate(operator_task_tokens_total{type="input",          model="claude-opus-4-8"}[15m]) * 5e-6
           or rate(operator_task_tokens_total{type="output",         model="claude-opus-4-8"}[15m]) * 25e-6
           or rate(operator_task_tokens_total{type="cache_read",     model="claude-opus-4-8"}[15m]) * 0.5e-6
           or rate(operator_task_tokens_total{type="cache_creation", model="claude-opus-4-8"}[15m]) * 6.25e-6
           or rate(operator_task_tokens_total{type="input",          model="claude-sonnet-5"}[15m]) * 3e-6
           or rate(operator_task_tokens_total{type="output",         model="claude-sonnet-5"}[15m]) * 15e-6
           or rate(operator_task_tokens_total{type="cache_read",     model="claude-sonnet-5"}[15m]) * 0.3e-6
           or rate(operator_task_tokens_total{type="cache_creation", model="claude-sonnet-5"}[15m]) * 3.75e-6
           or rate(operator_task_tokens_total{type="input",          model="claude-haiku-4-5"}[15m]) * 1e-6
           or rate(operator_task_tokens_total{type="output",         model="claude-haiku-4-5"}[15m]) * 5e-6
           or rate(operator_task_tokens_total{type="cache_read",     model="claude-haiku-4-5"}[15m]) * 0.1e-6
           or rate(operator_task_tokens_total{type="cache_creation", model="claude-haiku-4-5"}[15m]) * 1.25e-6
          )
    math_operator: ">"
    threshold: 0.5
    for: 15m
    decimal_points: 3
    annotations:
      summary: "Agents spending {{ index $values \"C\" }} USD/s over 15m (>$0.50/s, model-aware). A turn or loop is burning budget; check the task-delivery Cost panel."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  # ----------------------------------------------------------------------------
  # Agent turn-execution + boot failure paths: stalled turns and never-reachable
  # wrappers destroy work terminally. Distinct from the SubmitTurn RPC rules
  # (dispatch side) and the boot-crash-budget rule (pod never reaches /readyz).
  # ----------------------------------------------------------------------------
  - name: "Operator agent turn timeout spike"
    queries:
      - expression: |
          sum(increase(operator_turn_timeout_total{namespace="tatara",job="tatara-operator"}[1h]))
    math_operator: ">"
    threshold: 5
    for: 15m
    decimal_points: 0
    annotations:
      summary: "tatara-operator terminated {{ index $values \"C\" }} agent turn(s) for stalling in 1h (>5). Turns are exceeding the inactivity deadline (wedged model session or wrapper hang), burning budget and blocking Tasks. Operator-side turn-execution stall detector (across sources reconcile|poll_backstop|planning_watchdog), distinct from the SubmitTurn RPC latency rule."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  - name: "Operator agent unreachable terminations"
    queries:
      - expression: |
          sum(increase(operator_agent_unreachable_termination_total{namespace="tatara",job="tatara-operator"}[1h]))
    math_operator: ">"
    threshold: 0
    for: 5m
    decimal_points: 0
    annotations:
      summary: "tatara-operator terminated {{ index $values \"C\" }} Task(s) in 1h because the wrapper stayed unreachable past the boot deadline. A pod that booted but never became network-reachable killed the Task and wasted the work; a systemic pod-networking/CNI fault would otherwise go unnoticed. Distinct from the boot-crash-budget rule (pod never reached /readyz)."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  # Was reason="PodLost" on the phase-keyed metric. The stage machine's equivalent is
  # stageReason=pod-recreation-exhausted: the pod vanished mid-stage and the recreation
  # budget (maxPodRecreations, default 3) is spent, so the stage fails. Work in flight is
  # destroyed. Distinct from the boot-crash-budget and agent-unreachable rules, which cover
  # pods that never came up rather than pods that vanished mid-task. Also depends on D1 -
  # see the comment above "Operator task failure spike".
  - name: "Operator task pod-recreation budget exhausted"
    queries:
      - expression: |
          sum(increase(operator_task_terminal_total{namespace="tatara",job="tatara-operator",stage="failed",stageReason="pod-recreation-exhausted"}[1h])) or vector(0)
    math_operator: ">"
    threshold: 0
    for: 5m
    decimal_points: 0
    annotations:
      summary: "tatara-operator failed {{ index $values \"C\" }} Task(s) in 1h with stageReason=pod-recreation-exhausted - the agent pod was lost mid-stage and the recreation budget ran out. Investigate pod evictions, node pressure and OOM-kills on the wrapper workload."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  # ----------------------------------------------------------------------------
  # Inbound REST API + auth: agent turn callbacks/writebacks land on the operator
  # REST API (patch_task, propose_issue, *_outcome, post_comment, handover).
  # Auth rejections are info-only (email, no system=tatara label -> no incident
  # Task) so a credential typo does not raise an emergency-brainstorm.
  # ----------------------------------------------------------------------------
  - name: "Operator REST API error ratio high"
    queries:
      - expression: |
          (sum(increase(operator_restapi_requests_total{namespace="tatara",job="tatara-operator",result="error"}[15m])) / clamp_min(sum(increase(operator_restapi_requests_total{namespace="tatara",job="tatara-operator"}[15m])), 1)) and (sum(increase(operator_restapi_requests_total{namespace="tatara",job="tatara-operator"}[15m])) >= 10)
    math_operator: ">"
    threshold: 0.1
    for: 15m
    decimal_points: 2
    annotations:
      summary: "tatara-operator inbound REST API error ratio is {{ index $values \"C\" }} (>0.10) over 15m. Agent turn callbacks/writebacks (patch_task, propose_issue, *_outcome, post_comment, handover) are failing to land (5xx or Task-gone 404 on the internal-failure path; 4xx validation rejections are not counted as error)."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  - name: "Operator auth rejections elevated"
    queries:
      - expression: |
          sum(rate(operator_auth_total{namespace="tatara",job="tatara-operator",result=~"missing_token|invalid_scheme|invalid_token|rejected"}[10m]))
    math_operator: ">"
    threshold: 1
    for: 15m
    decimal_points: 2
    annotations:
      summary: "Operator REST API rejecting auth at {{ index $values \"C\" }}/s (missing/invalid/rejected tokens) for 15m. Possible misconfigured wrapper token, expired credential, or probing. Info-only (no system=tatara label): emails, does not raise an incident Task."
    labels:
      homelab: "true"
      component: "operator"
      severity: "info"
  # ----------------------------------------------------------------------------
  # Wrapper metric-push pipeline: wrapper pods have NO scrape target, so every
  # ccw_* series reaches Prometheus only via HTTP push to the operator receiver.
  # A push rejection or a fully dark receiver silently blinds all ccw_* alerts
  # (several of which use clamp_min/or vector(0) and stay green when blind).
  # ----------------------------------------------------------------------------
  - name: "Operator push receiver rejecting wrapper metrics"
    queries:
      - expression: |
          sum(increase(operator_push_receive_total{namespace="tatara",job="tatara-operator",result=~"rejected|too_large"}[15m]))
    math_operator: ">"
    threshold: 0
    for: 15m
    decimal_points: 0
    annotations:
      summary: "tatara-operator push receiver rejected {{ index $values \"C\" }} wrapper metric pushes (rejected/too_large) in 15m. Wrapper pods have no scrape target, so all ccw_* series arrive only via this push; rejections silently blind every ccw_* alert."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  # Fleet-wide backstop: aggregate across all 3 replicas. Each replica runs its own
  # in-memory receiver so pushed runs are LB-distributed. Per-instance matching would
  # false-fire on any replica the LB routes zero pushes to.
  # "Agents running" is now the AGENT POD COUNT (kube-state-metrics), not the Task count:
  # Tasks are long-lived and podless for most of their life (contract A.6/F.4), so
  # operator_tasks_inflight both disappeared and would have been the wrong signal.
  - name: "Wrapper metrics blind while agents running"
    queries:
      - expression: |
          ((sum(kube_pod_container_status_running{namespace="tatara",container="wrapper"}) or vector(0)) > 0) * (sum(operator_pushed_runs{namespace="tatara",job="tatara-operator"}) == bool 0)
    math_operator: ">"
    threshold: 0
    for: 15m
    decimal_points: 0
    annotations:
      summary: "{{ index $values \"C\" }} agent pod(s) are running but the entire operator fleet pushed zero wrapper metric runs for 15m. The ccw_* metric-push pipeline is dark while agents are running, so every wrapper alert (turns erroring, commit/push fail, http 5xx, panics) is silently blind."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  # ----------------------------------------------------------------------------
  # Slow leaks + per-project budget ceiling. Both are wired-but-quiet (0 series
  # today): the reaper-error metric emits only on a delete failure, the
  # token-budget gauge only once a project enables a budget window.
  # ----------------------------------------------------------------------------
  - name: "Operator orphan reap delete errors"
    queries:
      - expression: |
          sum(increase(operator_reap_delete_error_total{namespace="tatara",job="tatara-operator"}[1h])) or vector(0)
    math_operator: ">"
    threshold: 0
    for: 15m
    decimal_points: 0
    annotations:
      summary: "tatara-operator backstop reaper failed to delete orphan wrapper resources {{ index $values \"C\" }} time(s) in 1h. Orphans are accumulating (control-plane node pressure / cost leak); the success-side operator_orphan_reaped_total does not surface this. The `or vector(0)` keeps the series defined while the metric is wired-but-quiet."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  # Compares scope=used against the per-project emitted scope=emergency threshold
  # (drift-proof: no hardcoded ratio, tracks DefaultEmergencyPercent). The >=
  # join returns the used ratio for any project at/over its emergency ceiling, so
  # `> 0` fires only then. 0 series until a project sets budgetCfg.Enabled.
  - name: "Project token budget riding emergency ceiling"
    queries:
      - expression: |
          max by (project) (operator_token_budget_used_ratio{namespace="tatara",job="tatara-operator",scope="used"}) >= on(project) max by (project) (operator_token_budget_used_ratio{namespace="tatara",job="tatara-operator",scope="emergency"})
    math_operator: ">"
    threshold: 0
    for: 15m
    decimal_points: 2
    annotations:
      summary: "Project {{ index $labels \"project\" }} token-budget used ratio {{ index $values \"C\" }} has reached its own configured emergency spawn-pause threshold for 15m. Further agent spawns for the project are being paused. Distinct from the account-wide usage-gate alerts and the fleet $/s runaway rule."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  # ----------------------------------------------------------------------------
  # Stage machine (contract F.4). THE INVARIANT: no stage may be entered without a
  # deadline that leaves it. These rules do NOT enforce a business SLA - the operator's
  # own deadline machinery does that, moving the Task to parked or failed. They fire when
  # a Task sits PAST its budget, which means the deadline machinery itself is broken. That
  # is the silent-permanent-wedge class the 2026-07-11 hardening killed one edge at a time;
  # this is the general form.
  # Budgets: triaging 5m, brainstorming/investigating/refining/documenting 2h,
  # reviewing 4h, implementing 6h, clarifying/approved 24h.
  # ----------------------------------------------------------------------------
  # The incident-starvation rule keys on the admission queue itself, not on
  # stage="triaging": triaging's own budget is 5m -> failed(triage-stalled) (F.4), so a
  # Task literally cannot SIT in triaging for 15m and a stage-age rule there could never
  # fire (fix M20). operator_queue_age_seconds carries class,priority,state (K.1
  # addendum 8); class=alert is the incident pool (B.7). The priority filter is left open
  # pending verification of the actual priority values the operator emits - tighten to the
  # incident priority value once confirmed against the merged operator.
  - name: "Operator incident starved in triage"
    queries:
      - expression: |
          max(operator_queue_age_seconds{namespace="tatara",job="tatara-operator",class="alert",state="Queued"}) or vector(0)
    math_operator: ">"
    threshold: 300
    for: 2m
    decimal_points: 0
    annotations:
      summary: "The oldest queued alert-class event has been waiting {{ index $values \"C\" }}s (>5m) in state=Queued. Incidents are priority class 0 and AlertCapacity reserves a pod slot for them (contract B.7/B3), so an incident CANNOT be waiting on the normal pool. Either priority admission is broken or the whole triage path is wedged - a firing production alert is not being worked."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "critical"
  - name: "Operator triage stage wedged"
    queries:
      - expression: |
          max by (task) (operator_task_stage_age_seconds{namespace="tatara",job="tatara-operator",stage="triaging"})
    math_operator: ">"
    threshold: 900
    for: 5m
    decimal_points: 0
    annotations:
      summary: "Task {{ index $labels \"task\" }} has been in stage=triaging for {{ index $values \"C\" }}s. The budget is 5m and the exit is failed(triage-stalled), so past 15m the F.4 deadline machinery is not running. Nothing else in the stage machine can be trusted while this fires."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "critical"
  # fix V6-1: admission-starved (clock 1, 24h from stageEnteredAt) is armed on EVERY
  # POD stage, not just approved - and a Task entering one of these stages straight
  # from triaging can sit unadmitted for up to 24h before its own deadline machinery
  # parks it, which is NORMAL steady state at maxOpenTasks: 6 / maxConcurrentAgents: 3.
  # operator_task_stage_age_seconds counts from stageEnteredAt regardless of which of
  # the three clocks (admission/readiness/work) is currently armed, so it cannot
  # distinguish "queued 10h, healthy" from "working 10h, wedged". The threshold is
  # therefore raised past the worst-case HEALTHY envelope instead of trying to select
  # on a clock the metric does not expose:
  #   24h admission (clock 1)
  # + 3 x 5m readiness (clock 2 = podReadyTimeout = agentBootDeadline = 5m, and a
  #   breach RESPAWNS rather than failing - up to maxPodRecreations=3 laps, fix V7-7)
  # + <= 6h work (clock 3, the largest per-stage budget)
  # about 30.25h. 36h clears it with room and still catches a genuine wedge same-day.
  #
  # THIS REGEX IS POD STAGES ONLY, AND THAT IS LOAD-BEARING (fix V7-8). Pod-less
  # stages (triaging, approved, merging, deploying) do NOT run clock 1 - they run
  # clock 3 from stageEnteredAt against their own budget - so their wedge alerts key
  # on the real budget and are NOT raised: triaging 5m (above), merging 4h and
  # deploying 2h (alerts/tatara-cd.yaml). A merging Task past 4h is a real signal,
  # never queue noise. Do not "harmonise" those thresholds with this one.
  - name: "Operator pod stage wedged"
    queries:
      - expression: |
          max by (task, stage) (operator_task_stage_age_seconds{namespace="tatara",job="tatara-operator",stage=~"brainstorming|investigating|refining|documenting|implementing|reviewing"})
    math_operator: ">"
    threshold: 129600
    for: 15m
    decimal_points: 0
    annotations:
      summary: "Task {{ index $labels \"task\" }} has been in stage={{ index $labels \"stage\" }} for {{ index $values \"C\" }}s (>36h). These are POD stages: worst-case healthy is a 24h admission wait + up to 3 x 5m pod-readiness respawns + a work budget of 6h or less (F.4 clocks 1-3), about 30h. Past 36h none of the three deadlines is being enforced: the Task is holding a pod slot (or a queue slot) with no exit."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  # SPLIT in the v7 pass (fixes V6-1 + V7-8, which land on opposite sides of this
  # rule). clarifying and approved BOTH have a 24h budget, but they are not the same
  # shape of stage and a single threshold cannot serve both:
  #   clarifying is a POD stage -> it runs clock 1 (24h admission) AND THEN clock 3
  #     (24h work). Healthy worst case is about 48h, so a shared 36h threshold would
  #     FALSE-FIRE on a clarify Task that queued 20h and then worked 20h.
  #   approved is POD-LESS -> clock 3 ONLY, from stageEnteredAt, 24h (fix V7-8). It
  #     never carries an admission wait on top, so 36h is right for it and raising it
  #     would just blunt the alert.
  - name: "Operator human-wait stage wedged"
    queries:
      - expression: |
          max by (task) (operator_task_stage_age_seconds{namespace="tatara",job="tatara-operator",stage="clarifying"})
    math_operator: ">"
    threshold: 216000
    for: 30m
    decimal_points: 0
    annotations:
      summary: "Task {{ index $labels \"task\" }} has been in stage=clarifying for {{ index $values \"C\" }}s (>60h). clarifying is a POD stage with a 24h work budget exiting to parked(awaiting-human), and it can carry up to a 24h admission wait ahead of that (F.4 clock 1), so healthy worst case is about 48h. Past 60h neither deadline is firing."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  - name: "Operator approved stage starved"
    queries:
      - expression: |
          max by (task) (operator_task_stage_age_seconds{namespace="tatara",job="tatara-operator",stage="approved"})
    math_operator: ">"
    threshold: 129600
    for: 30m
    decimal_points: 0
    annotations:
      summary: "Task {{ index $labels \"task\" }} has been in stage=approved for {{ index $values \"C\" }}s (>36h). approved is POD-LESS: it runs the work clock only, from stageEnteredAt, budget 24h, exiting to parked(admission-starved) (F.4, fix V7-8). Past 36h the deadline is not firing. The one legitimate exception is a PAUSED project (maxConcurrentAgents == 0), which holds Tasks in approved deliberately and SKIPS the starve-park - check that first."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  - name: "Operator illegal stage transition"
    queries:
      - expression: |
          sum by (from, to) (increase(operator_illegal_stage_transition_total{namespace="tatara",job="tatara-operator"}[15m])) or vector(0)
    math_operator: ">"
    threshold: 0
    for: 5m
    decimal_points: 0
    annotations:
      summary: "tatara-operator attempted {{ index $values \"C\" }} illegal stage transition(s) from={{ index $labels \"from\" }} to={{ index $labels \"to\" }} in 15m. ANY non-zero value is a code bug in the F.3 transition table, not an operational condition."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  # Successor to the retired lifecycle-giveup alert (tatara_lifecycle_giveup_total went
  # with the issueLifecycle machine). The park counter is where a give-up now lands.
  - name: "Operator task park spike"
    queries:
      - expression: |
          sum by (stageReason) (increase(operator_task_parked_total{namespace="tatara",job="tatara-operator",stageReason!~"backlog-sweep|awaiting-human"}[3h])) or vector(0)
    math_operator: ">"
    threshold: 3
    for: 30m
    decimal_points: 0
    annotations:
      summary: "{{ index $values \"C\" }} Task(s) parked with stageReason={{ index $labels \"stageReason\" }} in 3h (>3). Successor to the lifecycle give-up alert. backlog-sweep is excluded (it is the zero-cost mint path that OWNS a backlog issue and spawns no pod) and awaiting-human is excluded (a human not having replied yet is not a platform failure). Everything else here is the platform failing to deliver."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  # kind=review is the ONE outcome kind whose commit does not itself advance the Task's
  # stage: the advance is deferred to MergeRequestReconciler -> DrainPendingReview ->
  # advanceAfterReview, a SECOND reconciler racing the pod-liveness caps. A 5m handoff
  # deadline (tatarav1alpha1.HandoffDeadline) bounds that race: if the drain has not
  # advanced the Task within 5m of the outcome landing, it parks stageReason=handoff-stalled.
  # ANY occurrence matters (threshold 0, mirrors pod-recreation-exhausted above) because
  # the review already landed - the PR is approved and posted - and this Task's only
  # recovery path left is a backlog-sweep re-mint. Two causes: a dead drain (the
  # MergeRequest CR was deleted, the workqueue item was dropped, or leader election
  # changed over) versus a drain that was merely slow because the forge was degraded for
  # more than 5m (false positive - the work is fine, just late). Correlate with SCM/webhook
  # error-ratio alerts in the same window to tell the two apart.
  - name: "Operator handoff drain stalled"
    queries:
      - expression: |
          sum(increase(operator_task_terminal_total{namespace="tatara",job="tatara-operator",stage="parked",stageReason="handoff-stalled"}[1h])) or vector(0)
    math_operator: ">"
    threshold: 0
    for: 5m
    decimal_points: 0
    annotations:
      summary: "tatara-operator parked {{ index $values \"C\" }} Task(s) in 1h with stage=parked, stageReason=handoff-stalled. A review outcome was accepted and the PR review already landed, but the cross-reconciler drain (MergeRequestReconciler -> DrainPendingReview -> advanceAfterReview) did not advance the Task within the 5m handoff deadline, so it parked instead of progressing. Check whether the MergeRequest CR was deleted, the workqueue item was dropped, or leader election changed over (dead drain, needs a fix or a manual nudge) versus an SCM/forge degradation lasting over 5m that only slowed the drain down (false positive, work is fine). Recovery today is a backlog-sweep re-mint; a human should confirm which case this is before waiting on that."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  # ----------------------------------------------------------------------------
  # Release-train integrity + the etcd object budget. Both are CRITICAL on ANY value.
  # ----------------------------------------------------------------------------
  # The operator injects TATARA_CONTRACT_VERSION=2; the cli refuses to boot on a mismatch
  # and the operator fails the Task with stageReason=agent-contract-mismatch BEFORE turn-0
  # (contract G.10). The wrapper image is pinned in a DIFFERENT helm release
  # (project-tatara) than the operator, and helmfile applies releases CONCURRENTLY, so
  # new-operator + old-agent IS reachable. This is the alert that catches a skewed train.
  - name: "Operator agent contract version mismatch"
    queries:
      - expression: |
          sum by (expected, got, image) (increase(operator_agent_contract_mismatch_total{namespace="tatara",job="tatara-operator"}[5m])) or vector(0)
    math_operator: ">"
    threshold: 0
    for: 1m
    decimal_points: 0
    annotations:
      summary: "{{ index $values \"C\" }} agent pod(s) reported contract version {{ index $labels \"got\" }} where the operator expects {{ index $labels \"expected\" }} (image {{ index $labels \"image\" }}). The four-release train is SKEWED: the agent image pin in the project-tatara release did not land with the operator. Every Task that spawns a pod fails instantly. Fix the pin in tatara-helmfile values/project-*/common.yaml agent.image; do not restart the operator."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "critical"
  # K.2 minimum alert set: "UNEXPECTED MERGE (CRITICAL)". C.9's accepted-risk detector:
  # an MR found merged with no corresponding mergeCursor advance, i.e. something other
  # than the operator's own sequential merge (C.5) put code on a cluster-admin-scoped
  # deploy path.
  - name: "Operator unexpected merge detected"
    queries:
      - expression: |
          sum by (repo) (increase(operator_unexpected_merge_total{namespace="tatara",job="tatara-operator"}[15m])) or vector(0)
    math_operator: ">"
    threshold: 0
    for: 5m
    decimal_points: 0
    annotations:
      summary: "{{ index $values \"C\" }} unexpected merge(s) on repo {{ index $labels \"repo\" }} in 15m - an MR merged without the operator's mergeCursor advancing. Something other than the operator's own sequential merge (contract C.5) put code on a cluster-admin-scoped deploy path. Investigate who merged it and what shipped, immediately."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "critical"
  # A.7: the pre-write byte guard marshals every object before Update and evicts oldest
  # comments/notes until it fits under 800,000 bytes. This fires when it COULD NOT evict
  # enough. A 413 is not retried by RetryOnConflict, so every writer fails, the Task
  # becomes permanently unwritable, and its Issues/MRs stay pinned by ownership forever -
  # the worst failure mode in the whole design.
  - name: "Operator object too large to write"
    queries:
      - expression: |
          sum by (kind, name) (increase(operator_object_too_large_total{namespace="tatara",job="tatara-operator"}[15m])) or vector(0)
    math_operator: ">"
    threshold: 0
    for: 5m
    decimal_points: 0
    annotations:
      summary: "tatara-operator could not fit {{ index $labels \"kind\" }}/{{ index $labels \"name\" }} under the 800,000-byte object budget after evicting everything evictable ({{ index $values \"C\" }} attempt(s) in 15m). That object is now PERMANENTLY UNWRITABLE and any Issue/MergeRequest it owns is pinned open forever. Manual intervention required."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "critical"
  # B.2 rule 5: an Issue/MR must NEVER have zero controller owners. An artifact with plain
  # owners and no controller owner is worked by nobody and re-minted by nobody (the orphan
  # predicate sees an owned Issue). The operator repairs it by promoting the oldest
  # surviving owner - this alert says the repair guard had to fire, i.e. an ownership
  # invariant broke somewhere in the fold (B.3) or reap (B.5) path.
  - name: "Operator artifact left with no controller owner"
    queries:
      - expression: |
          sum(increase(operator_orphan_no_controller_total{namespace="tatara",job="tatara-operator"}[1h])) or vector(0)
    math_operator: ">"
    threshold: 0
    for: 5m
    decimal_points: 0
    annotations:
      summary: "tatara-operator's ownership repair guard fired {{ index $values \"C\" }} time(s) in 1h: an Issue or MergeRequest was found with plain owners and NO controller owner. The fold or reap controller-handover path has a bug. The guard repaired it by promoting the oldest surviving owner, but the invariant broke."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "critical"
  - name: "Operator GC blocked"
    queries:
      - expression: |
          sum by (reason) (increase(operator_gc_blocked_total{namespace="tatara",job="tatara-operator"}[1h])) or vector(0)
    math_operator: ">"
    threshold: 0
    for: 15m
    decimal_points: 0
    annotations:
      summary: "tatara-operator could not garbage-collect {{ index $values \"C\" }} object(s) in 1h, reason={{ index $labels \"reason\" }} (no_controller_owner | fold_in_flight | doc_reference). Tasks and their Issue/MergeRequest CRs are accumulating in etcd. A fold_in_flight that never clears means a refine umbrella died mid-adoption."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  # ----------------------------------------------------------------------------
  # The sweep. This is the ONLY heartbeat in the tatara alert set, and it is the ONLY rule
  # that overrides no_data_state / exec_err_state.
  #
  # Every alert file sets default_no_data_state: "OK" and grafana.tf sets
  # default_exec_err_state = "OK". For a gauge that legitimately vanishes when the fleet is
  # idle that is correct. For a HEARTBEAT it is catastrophic: NoData IS the failure, and OK
  # is the failure being reported as health. If the operator stops sweeping - or stops
  # existing - this rule must PAGE, not go quiet.
  # Successor to "Operator scan loop stalled" (tatara_scan_*, deleted with the scan).
  # ----------------------------------------------------------------------------
  - name: "Operator sweep heartbeat stale"
    queries:
      - expression: |
          time() - operator_sweep_last_success_timestamp_seconds{namespace="tatara",job="tatara-operator"}
    math_operator: ">"
    threshold: 7200
    for: 10m
    decimal_points: 0
    no_data_state: "Alerting"
    exec_err_state: "Alerting"
    annotations:
      summary: "tatara-operator sweep activity={{ index $labels \"activity\" }} last succeeded {{ index $values \"C\" }}s ago (>2h). No orphan Issues are being minted into Tasks and no backlog is being mirrored. NoData on this rule is ALSO a failure and is configured to fire: an absent series means the operator is not sweeping at all."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "critical"
  - name: "Operator sweep erroring"
    queries:
      - expression: |
          sum by (activity, reason) (increase(operator_sweep_errors_total{namespace="tatara",job="tatara-operator"}[1h])) or vector(0)
    math_operator: ">"
    threshold: 5
    for: 15m
    decimal_points: 0
    annotations:
      summary: "tatara-operator sweep activity={{ index $labels \"activity\" }} errored {{ index $values \"C\" }} time(s) in 1h (reason={{ index $labels \"reason\" }}). The heartbeat may still be green if SOME passes succeed; this catches the partially-failing sweep."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  - name: "Operator task mint burst"
    queries:
      - expression: |
          sum(increase(operator_tasks_minted_per_sweep_sum{namespace="tatara",job="tatara-operator"}[1h])) or vector(0)
    math_operator: ">"
    threshold: 20
    for: 15m
    decimal_points: 0
    annotations:
      summary: "tatara-operator minted {{ index $values \"C\" }} Tasks in 1h (>20). The sweep is capped at maxNewTasksPerSweep (5) per pass, so this is either a mint/reap loop (an issue being re-minted because ownership is not sticking) or a genuine backlog drain. Check operator_task_stage{stage=\"parked\"}: a healthy backlog drain mints parked(backlog-sweep) Tasks that spawn ZERO pods."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  - name: "Operator sweep creation budget chronically capped"
    queries:
      - expression: |
          sum by (project, cap) (increase(operator_sweep_mint_cap_hit_total{namespace="tatara",job="tatara-operator"}[3h])) or vector(0)
    math_operator: ">"
    threshold: 6
    for: 30m
    decimal_points: 0
    annotations:
      summary: "The sweep for project {{ index $labels \"project\" }} hit its {{ index $labels \"cap\" }} budget {{ index $values \"C\" }} times in 3h. Orphan Issues are being discovered faster than the creation budget lets them be minted. Expected for a few hours after cutover (a 150-issue backlog takes about 30 passes at 5/pass); sustained past a day it means maxOpenTasks is starving the sweep."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  # K.2 minimum alert set: "docs never written (WARNING)" (fixes M21/L29). The nightly
  # documenting batch starved and never ran. Every Task eligible for docs stays
  # permanently undocumented - documentedBy never re-arms once empty (F.3's delivered row).
  - name: "Operator documentation batch abandoned"
    queries:
      - expression: |
          sum by (reason) (increase(operator_doc_task_abandoned_total{namespace="tatara",job="tatara-operator",reason="never_ran"}[25h])) or vector(0)
    math_operator: ">"
    threshold: 0
    for: 5m
    decimal_points: 0
    annotations:
      summary: "tatara-operator's nightly documentation batch did not run in the last 25h ({{ index $values \"C\" }} Task(s) abandoned). Every delivered Task eligible for docs (fix F2) is now permanently undocumented until the next batch picks up NEW eligible Tasks - documentedBy never retries the ones it missed."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  # ----------------------------------------------------------------------------
  # Pod TTL, SCM egress, and the bundle byte budget.
  # ----------------------------------------------------------------------------
  # G.7 stop sequence: drain the in-flight turn, submit the handoff turn, hard cap, then a
  # SYNTHETIC operator handoff note, then force-delete. outcome=agent_handoff and
  # outcome=synthetic_handoff both END WITH A NOTE - the Task keeps its continuation state.
  # outcome=force_deleted is the one where the pod died holding un-noted context. Notes ARE
  # the continuation state (A.4), so this is silent work loss.
  - name: "Operator agent pod force-deleted at TTL"
    queries:
      - expression: |
          sum by (agent_kind) (increase(operator_agent_pod_ttl_expired_total{namespace="tatara",job="tatara-operator",outcome="force_deleted"}[1h])) or vector(0)
    math_operator: ">"
    threshold: 0
    for: 5m
    decimal_points: 0
    annotations:
      summary: "{{ index $values \"C\" }} {{ index $labels \"agent_kind\" }} agent pod(s) were FORCE-DELETED at TTL in 1h - the G.7 stop sequence got neither an agent handoff nor a synthetic one. Notes are the continuation state, so the next pod for that Task resumes from a bundle that is missing the last turn's work. Silent work loss; the Task will look healthy."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  # C.8: doPagedGET now carries the rate-limit handling that previously existed only on the
  # write path, plus a per-project egress token bucket (about 20 req/s). A rate-limited read
  # means the mirror is going stale, which means every agent bundle is going stale.
  - name: "Operator SCM rate limited"
    queries:
      - expression: |
          sum by (provider, limit_type) (increase(operator_scm_ratelimited_total{namespace="tatara",job="tatara-operator"}[10m])) or vector(0)
    math_operator: ">"
    threshold: 0
    for: 5m
    decimal_points: 0
    annotations:
      summary: "tatara-operator was rate-limited by {{ index $labels \"provider\" }} {{ index $values \"C\" }} time(s) in 10m (limit_type={{ index $labels \"limit_type\" }}). GitHub's secondary limit is 80 content-creating requests/min and 500/hour. The Issue/MergeRequest mirror is falling behind, so every context bundle rendered from it is stale."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
  # E.5 / D1: the bundle has a HARD byte budget (maxBundleBytes, default 400 KB). Oldest
  # comments elide first, behind an explicit <comments total= rendered= elided=> marker - the
  # agent is never lied to about completeness. Elision firing at all means an Issue thread has
  # outgrown the budget and agents are now working from a partial thread.
  - name: "Operator context bundle over budget"
    queries:
      - expression: |
          sum by (agent_kind) (increase(operator_bundle_elided_total{namespace="tatara",job="tatara-operator"}[1h])) or vector(0)
    math_operator: ">"
    threshold: 0
    for: 15m
    decimal_points: 0
    annotations:
      summary: "{{ index $values \"C\" }} context bundle(s) for {{ index $labels \"agent_kind\" }} agents exceeded maxBundleBytes in 1h and had their oldest comments elided. The agent is told (the <comments elided=> marker is explicit), but it is working from a partial thread. At a 400 KB budget against an 8192-byte comment cap this should essentially never fire."
    labels:
      homelab: "true"
      system: "tatara"
      component: "operator"
      severity: "warning"
