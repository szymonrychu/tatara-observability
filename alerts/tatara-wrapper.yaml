---
# tatara-claude-code-wrapper (component=wrapper) alert rules.
#
# The wrapper runs as EPHEMERAL agent job pods spawned by the operator
# (container="wrapper", pods named tatara-<project>-<gh|gl>-<repo>-<issue|mr>-<n>
# and tatara-<project>-<gh|gl>-brainstorm). It has NO long-lived Deployment and
# NO /metrics scrape target: it pushes its ccw_*/tatara_wrapper_* series through
# the operator's remote-write pushgateway. Therefore:
#   * the workload-generic block pins on container="wrapper" in kube-state-metrics
#     (there is no up{} series for the wrapper to do a "target down" rule on).
#   * the ccw_*/tatara_wrapper_* rules below are LIVE: pushMetricsAllowedPrefixes was
#     widened (operator 12729ed) so the operator push allowlist now forwards those
#     families. default_no_data_state: "OK" keeps a rule green when its series is
#     genuinely absent (e.g. no agent pods running), not firing.
interval_seconds: 60
default_no_data_state: "OK"
rules:
  # ---- workload-generic (pinned to the wrapper agent container) ----
  - name: "Wrapper agent container crash-looping"
    queries:
      - expression: |
          max(increase(kube_pod_container_status_restarts_total{namespace="tatara",container="wrapper"}[15m]))
    math_operator: ">"
    threshold: 3
    for: 15m
    decimal_points: 0
    annotations:
      summary: "Wrapper agent container restarted {{ index $values \"C\" }} times in 15m in namespace {{ index $labels \"namespace\" }}. Agent pods are crash-looping."
    labels:
      homelab: "true"
      system: "tatara"
      component: "wrapper"
      severity: "warning"
  - name: "Wrapper agent container OOMKilled"
    queries:
      - expression: |
          sum(kube_pod_container_status_last_terminated_reason{namespace="tatara",container="wrapper",reason="OOMKilled"})
    math_operator: ">"
    threshold: 0
    for: 5m
    decimal_points: 0
    annotations:
      summary: "{{ index $values \"C\" }} wrapper agent container(s) last terminated OOMKilled in namespace {{ index $labels \"namespace\" }}. Raise the agent memory limit."
    labels:
      homelab: "true"
      system: "tatara"
      component: "wrapper"
      severity: "warning"
  - name: "Wrapper agent container stuck waiting"
    queries:
      - expression: |
          sum(kube_pod_container_status_waiting_reason{namespace="tatara",container="wrapper",reason=~"CrashLoopBackOff|ImagePullBackOff|ErrImagePull|CreateContainerError|CreateContainerConfigError"})
    math_operator: ">"
    threshold: 0
    for: 15m
    decimal_points: 0
    annotations:
      summary: "{{ index $values \"C\" }} wrapper agent container(s) stuck waiting (image-pull or create-container error) in namespace {{ index $labels \"namespace\" }}. Agents cannot start."
    labels:
      homelab: "true"
      system: "tatara"
      component: "wrapper"
      severity: "critical"
  - name: "Wrapper agent pods not becoming ready"
    queries:
      - expression: |
          sum(kube_pod_status_ready{namespace="tatara",condition="false"} * on(pod,namespace) group_left() max(kube_pod_container_status_waiting_reason{namespace="tatara",container="wrapper"}) by (pod,namespace))
    math_operator: ">"
    threshold: 2
    for: 30m
    decimal_points: 0
    annotations:
      summary: "{{ index $values \"C\" }} wrapper agent pod(s) not Ready for 30m in namespace {{ index $labels \"namespace\" }}. Agent throughput degraded."
    labels:
      homelab: "true"
      system: "tatara"
      component: "wrapper"
      severity: "warning"
  # ---- wrapper-specific (ccw_*/tatara_wrapper_* via operator push; LIVE since operator 12729ed) ----
  - name: "Wrapper commit/push failure ratio high"
    queries:
      - expression: |
          sum(rate(ccw_commit_push_total{result="fail"}[30m])) / clamp_min(sum(rate(ccw_commit_push_total[30m])), 0.0001)
    math_operator: ">"
    threshold: 0.2
    for: 30m
    decimal_points: 2
    annotations:
      summary: "Wrapper commit/push failing {{ index $values \"C\" }} of pushes over 30m (>20%). Agent work is not landing on the source repos."
    labels:
      homelab: "true"
      system: "tatara"
      component: "wrapper"
      severity: "warning"
  - name: "Wrapper turns erroring"
    queries:
      - expression: |
          sum(rate(ccw_turns_total{result="failed"}[30m])) / clamp_min(sum(rate(ccw_turns_total[30m])), 0.0001)
    math_operator: ">"
    threshold: 0.3
    for: 30m
    decimal_points: 2
    annotations:
      summary: "Wrapper turns failing {{ index $values \"C\" }} of turns over 30m (>30%). Claude sessions are erroring out."
    labels:
      homelab: "true"
      system: "tatara"
      component: "wrapper"
      severity: "warning"
  - name: "Wrapper HTTP 5xx responses"
    queries:
      - expression: |
          sum(rate(ccw_http_requests_total{status_code=~"5..", route!~"/readyz|/healthz|/metrics"}[10m]))
    math_operator: ">"
    threshold: 0
    for: 10m
    decimal_points: 2
    annotations:
      summary: "Wrapper HTTP API returning 5xx (excludes /readyz|/healthz|/metrics probes) at {{ index $values \"C\" }}/s over 10m. A real wrapper API request path is erroring."
    labels:
      homelab: "true"
      system: "tatara"
      component: "wrapper"
      severity: "warning"
  - name: "Wrapper HTTP handler panics"
    queries:
      - expression: |
          sum(increase(ccw_http_panics_total[15m]))
    math_operator: ">"
    threshold: 0
    for: 5m
    decimal_points: 0
    annotations:
      summary: "Wrapper recovered {{ index $values \"C\" }} HTTP handler panic(s) in 15m. A request path is panicking."
    labels:
      homelab: "true"
      system: "tatara"
      component: "wrapper"
      severity: "critical"
  - name: "Wrapper Claude process crash-looping"
    # ccw_claude_restarts_total counts restarts of the Claude subprocess INSIDE a
    # wrapper pod - distinct from the kube container crash-loop rule above, which
    # keys on kube_pod_container_status_restarts_total{container="wrapper"} and only
    # increments when the wrapper CONTAINER restarts. A looping Claude subprocess
    # with the wrapper staying up burns budget and stalls the Task without tripping
    # that rule. Group by exported_pod (the ephemeral agent pod): on the pushed
    # series `pod` is the operator re-exporter pod, so by(pod) would fan every agent
    # run on one operator replica into a single bucket. for:5m (not 15m) so it fires
    # before the ephemeral agent pod's pushed series is TTL-evicted (matches the
    # ccw_http_panics_total precedent).
    queries:
      - expression: |
          sum by (exported_pod) (increase(ccw_claude_restarts_total[15m]))
    math_operator: ">"
    threshold: 3
    for: 5m
    decimal_points: 0
    annotations:
      summary: "Claude subprocess restarted {{ index $values \"C\" }} times in 15m inside wrapper agent pod {{ index $labels \"exported_pod\" }}. The in-pod agent session is crash-looping (burning budget, stalling the Task)."
    labels:
      homelab: "true"
      system: "tatara"
      component: "wrapper"
      severity: "warning"
  # The "Wrapper token spend runaway" rule was MOVED to alerts/tatara-operator.yaml
  # 2026-07-04 as "Agent token spend runaway ($/s)": it read the dead/ephemeral
  # ccw_turn_tokens_total push family and thresholded on a flat token/s number;
  # re-baselined onto the durable operator_task_tokens_total{model,type} metric
  # priced per-model in $/s (review gap G17 / G2 durable-measurement design).
  # The "Wrapper metrics dropped by operator push allowlist" canary was REMOVED
  # 2026-06-25: its purpose (signal that ccw_*/tatara_wrapper_* were dark) is done -
  # pushMetricsAllowedPrefixes was widened (operator 12729ed). The residual
  # reserved_name drops are the wrapper push-forwarding go_*/process_* runtime
  # metrics it should not (wrapper bug, tracked separately), so the canary only
  # false-fired. operator_push_series_dropped_total has no per-prefix label to scope
  # it, so do not re-add it as-is; add a targeted rule only if a specific ccw_*
  # family is observed dark again.
